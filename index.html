<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { margin: 0; padding: 0; font-family: Arial, sans-serif; background: #fff; }
    #meta-report { width: 100%; padding: 10px 0; }
    .report-header { text-align: center; margin-bottom: 15px; }
    .report-header h1 { font-size: 22px; font-weight: bold; color: #000; margin: 0 0 4px 0; }
    .report-date { font-size: 12px; color: #666; font-style: italic; margin: 0; }
    .table-responsive { overflow-x: auto; border: 1px solid #d1d5db; }
    table { width: 100%; border-collapse: collapse; background: #fff; }
    th { background: #f8fafc; color: #374151; font-weight: bold; font-size: 18px; padding: 8px 12px; border: 1px solid #d1d5db; text-align: center; }
    td { padding: 8px 12px; border: 1px solid #e5e7eb; font-size: 18px; color: #000; text-align: center; white-space: nowrap; }
    .loading { color: #9ca3af; padding: 20px; text-align: center; }
    .error { color: #ef4444; padding: 20px; text-align: center; }
  </style>
</head>
<body>
  <div id="meta-report">
    <div class="report-header">
      <h1>META Ad Performance</h1>
      <p class="report-date">Live Dashboard View</p>
    </div>
    <div class="table-responsive">
      <table>
        <thead>
          <tr>
            <th>Campaign Name</th>
            <th>Ad</th>
            <th>Cost Per Conversion</th>
            <th>Conversions</th>
            <th>Converted to Won</th>
            <th>Total Won Value</th>
          </tr>
        </thead>
        <tbody id="report-body">
          <tr><td colspan="6" class="loading">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script>
    const PROXY_URL = "https://ghl-proxy.apfelipe94.workers.dev";

    fetch(`${PROXY_URL}/?endpoint=sheet`)
      .then(res => res.json())
      .then(json => {
        const tbody = document.getElementById("report-body");
        const rows  = json.data || [];
        if (rows.length === 0) {
          tbody.innerHTML = '<tr><td colspan="6" class="loading">No data available.</td></tr>';
          return;
        }
        tbody.innerHTML = rows.map(r => `
          <tr>
            <td>${r.campaign}</td>
            <td>${r.ad}</td>
            <td>${r.cpc}</td>
            <td>${r.conversions}</td>
            <td>${r.won}</td>
            <td>${r.value}</td>
          </tr>
        `).join("");
      })
      .catch(err => {
        document.getElementById("report-body").innerHTML =
          `<tr><td colspan="6" class="error">Failed to load data.</td></tr>`;
      });
  </script>
</body>
</html>
