<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { margin: 0; padding: 0; font-family: Arial, sans-serif; background: #fff; }
    #meta-report { width: 100%; padding: 10px 0; }
    .report-header { text-align: center; margin-bottom: 15px; }
    .report-header h1 { font-size: 22px; font-weight: bold; color: #000; margin: 0 0 4px 0; }
    .report-date { font-size: 12px; color: #666; font-style: italic; margin: 0; }
    .table-responsive { overflow-x: auto; border: 1px solid #d1d5db; }
    table { width: 100%; border-collapse: collapse; background: #fff; }
    th { background: #f8fafc; color: #374151; font-weight: bold; font-size: 18px; padding: 8px 12px; border: 1px solid #d1d5db; text-align: center; }
    td { padding: 8px 12px; border: 1px solid #e5e7eb; font-size: 18px; color: #000; text-align: center; white-space: nowrap; }
    .loading { color: #9ca3af; padding: 20px; text-align: center; }
    .error { color: #ef4444; padding: 20px; text-align: center; }
  </style>
</head>
<body>
  <div id="meta-report">
    <div class="report-header">
      <h1>META Ad Performance</h1>
      <p class="report-date">Live Dashboard View</p>
    </div>
    <div class="table-responsive">
      <table>
        <thead>
          <tr>
            <th>Campaign Name</th>
            <th>Ad</th>
            <th>Cost Per Conversion</th>
            <th>Conversions</th>
            <th>Converted to Won</th>
            <th>Total Won Value</th>
          </tr>
        </thead>
        <tbody id="report-body">
          <tr><td colspan="6" class="loading">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script>
    const PROXY_URL         = "https://ghl-proxy.apfelipe94.workers.dev";
    const META_ACCESS_TOKEN = "EAANYnXKToskBRkBjjN52Qb6dCYdtqSHxMXWGrviH6ZAdrhbdBK2RYJ2Q7OQYv6yXDYKDNoClSjxaKZCg6BG786eJh56qbrP0yaa2PVFaxn0Swa4dk2QeCm578WvRZByMeM818Mpx1TUtV09taPOinJV4tCZAVKFFdVgp4imKq2YMRVSZA5sJPK7Yi67G7";
    const META_AD_ACCOUNT_ID = "act_710184103636781";
    const CAMPAIGN_FILTER    = "DDA";

    async function loadReport() {
      const tbody = document.getElementById("report-body");
      try {
        const [cpcMap, contacts, wonMap] = await Promise.all([
          fetchMetaCPC(),
          fetchGHLContacts(),
          fetchWonOpps()
        ]);

        const adMap = {};
        contacts.forEach(contact => {
          const attrs = contact.attributions || [];
          const first = attrs.find(a => a.isFirst) || attrs[0] || {};
          const campaign = first.campaignName || first.campaign || first.utmCampaign || contact.source || "Unknown";
          const adName   = first.adName || first.ad_name || first.utmContent || first.utm_content || first.adSetName || "Unknown Ad";
          const key = `${campaign}||${adName}`;

          if (!adMap[key]) {
            adMap[key] = {
              campaign, adName,
              cpc: cpcMap[adName] || 0,
              conversions: 0, wonCount: 0, wonValue: 0
            };
          }
          adMap[key].conversions++;
          const contactId = contact.id || contact.contactId;
          if (contactId && wonMap[contactId]) {
            adMap[key].wonCount++;
            adMap[key].wonValue += wonMap[contactId];
          }
        });

        const rows = Object.values(adMap)
          .filter(r => r.campaign.toUpperCase().startsWith(CAMPAIGN_FILTER))
          .sort((a, b) => b.wonValue !== a.wonValue ? b.wonValue - a.wonValue : b.conversions - a.conversions);

        if (rows.length === 0) {
          tbody.innerHTML = '<tr><td colspan="6" class="loading">No data found.</td></tr>';
          return;
        }

        tbody.innerHTML = rows.map(r => `
          <tr>
            <td>${r.campaign}</td>
            <td>${r.adName}</td>
            <td>${r.cpc ? "$" + r.cpc.toFixed(2) : "$0.00"}</td>
            <td>${r.conversions}</td>
            <td>${r.wonCount} Won</td>
            <td>$${r.wonValue.toLocaleString("en-US", {minimumFractionDigits:2, maximumFractionDigits:2})}</td>
          </tr>
        `).join("");

      } catch(err) {
        tbody.innerHTML = `<tr><td colspan="6" class="error">Error: ${err.message}</td></tr>`;
        console.error(err);
      }
    }

    async function fetchMetaCPC() {
      const cpcMap = {};
      const end   = new Date();
      const start = new Date();
      start.setDate(end.getDate() - 30);
      const fmt = d => d.toISOString().split("T")[0];
      const timeRange = encodeURIComponent(JSON.stringify({ since: fmt(start), until: fmt(end) }));
      const url = `https://graph.facebook.com/v20.0/${META_AD_ACCOUNT_ID}/insights?level=ad&fields=ad_name,cost_per_result&time_range=${timeRange}&limit=500&access_token=${META_ACCESS_TOKEN}`;
      const res  = await fetch(url);
      const json = await res.json();
      (json.data || []).forEach(ad => {
        const cprArray = ad.cost_per_result || [];
        let cpc = 0;
        if (cprArray.length > 0 && cprArray[0].values && cprArray[0].values.length > 0) {
          cpc = parseFloat(cprArray[0].values[0].value || 0);
        }
        if (ad.ad_name) cpcMap[ad.ad_name] = cpc;
      });
      return cpcMap;
    }

    async function fetchGHLContacts() {
      const all = [];
      let page = 1;
      while (true) {
        const res  = await fetch(`${PROXY_URL}/?endpoint=contacts&page=${page}`);
        const json = await res.json();
        const contacts = json.contacts || [];

        const fb = contacts.filter(c => {
          const src = (c.source || "").toLowerCase();
          if (src.includes("facebook") || src.includes("fb") || src.includes("meta")) return true;
          return (c.attributions || []).some(a => {
            const s = (a.utmSessionSource || "").toLowerCase();
            const m = (a.medium || "").toLowerCase();
            const hasAd  = !!(a.adName || a.utmContent);
            const hasCmp = !!(a.campaignName || a.utmCampaign);
            return s.includes("facebook") || s.includes("fb") || s.includes("meta")
                || m.includes("facebook") || m.includes("paid") || (hasAd && hasCmp);
          });
        });

        all.push(...fb);
        if (contacts.length < 100) break;
        page++;
        await new Promise(r => setTimeout(r, 250));
      }
      return all;
    }

    async function fetchWonOpps() {
      const wonMap = {};
      let page = 1;
      while (true) {
        const res  = await fetch(`${PROXY_URL}/?endpoint=opportunities&page=${page}`);
        const json = await res.json();
        const opps = json.opportunities || [];
        opps.forEach(opp => {
          const cid = opp.contactId || (opp.contact && opp.contact.id);
          if (cid) wonMap[cid] = (wonMap[cid] || 0) + parseFloat(opp.monetaryValue || 0);
        });
        if (opps.length < 100) break;
        page++;
        await new Promise(r => setTimeout(r, 250));
      }
      return wonMap;
    }

    loadReport();
  </script>
</body>
</html>
